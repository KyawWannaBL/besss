<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting - Britium Express</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .message {
      font-size: 1.1rem;
      margin-top: 1rem;
      opacity: 0.9;
    }
    .error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🚚 Britium Express</div>
    <div class="spinner"></div>
    <div class="message" id="message">Redirecting to password reset...</div>
    <div id="error" class="error" style="display: none;"></div>
  </div>

  <script>
    (function() {
      const messageEl = document.getElementById('message');
      const errorEl = document.getElementById('error');
      
      try {
        // Get the full hash from URL
        const hash = window.location.hash;
        console.log('Auth redirect - Full hash:', hash);
        
        if (!hash || hash.length < 10) {
          throw new Error('No authentication data found in URL');
        }
        
        // Extract token parameters
        let tokenParams = '';
        if (hash.includes('access_token=')) {
          const tokenStart = hash.indexOf('access_token=');
          tokenParams = hash.substring(tokenStart);
        }
        
        if (!tokenParams) {
          throw new Error('No access token found');
        }
        
        // Parse to verify it's valid
        const params = new URLSearchParams(tokenParams);
        const accessToken = params.get('access_token');
        const type = params.get('type');
        
        if (!accessToken) {
          throw new Error('Invalid token format');
        }
        
        console.log('Token type:', type);
        
        // Determine the correct redirect URL based on type
        let redirectPath = '/';
        if (type === 'recovery') {
          redirectPath = '/#/reset-password';
        } else if (type === 'signup' || type === 'invite') {
          redirectPath = '/#/login';
        }
        
        // Get the current deployment URL (or use a default)
        const deploymentUrl = window.location.origin;
        const targetUrl = `${deploymentUrl}${redirectPath}#${tokenParams}`;
        
        console.log('Redirecting to:', targetUrl);
        messageEl.textContent = 'Redirecting you now...';
        
        // Redirect after a short delay
        setTimeout(() => {
          window.location.href = targetUrl;
        }, 1000);
        
      } catch (error) {
        console.error('Redirect error:', error);
        errorEl.style.display = 'block';
        errorEl.textContent = `Error: ${error.message}. Please request a new password reset link.`;
        messageEl.textContent = 'Redirect failed';
      }
    })();
  </script>
</body>
</html>
